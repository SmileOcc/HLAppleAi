publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_staggered_grid_view: ^0.7.0
  image_picker: ^1.0.7
